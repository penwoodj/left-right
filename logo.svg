<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Subtle flow lines -->
  <g opacity="0.12">
    <line x1="20" y1="25" x2="100" y2="25" stroke="#3B82F6" stroke-width="1" />
    <line x1="300" y1="75" x2="380" y2="75" stroke="#EC4899" stroke-width="1" />
  </g>

  <!-- Main logo text: {_<_>} -->
  <text x="200" y="72" text-anchor="middle" font-family="'Courier New', 'Fira Code', 'JetBrains Mono', monospace" font-size="64" font-style="italic" font-weight="bold" fill="url(#flowGradient)" filter="url(#glow)">
    {_&lt;_&gt;}
  </text>

  <!-- Subtle underline -->
  <line x1="120" y1="84" x2="280" y2="84" stroke="url(#flowGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
</svg>
