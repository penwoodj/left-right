<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#4a9e8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8abfb2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#8abfb2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d71bf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <text x="140" y="68" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="72" font-style="italic" font-weight="600" filter="url(#glow)">
    <tspan fill="#b358b5">{</tspan><tspan fill="url(#greenGrad)">_</tspan><tspan dx="-4" fill="url(#greenGrad)">&lt;</tspan><tspan fill="url(#blueGrad)">_</tspan><tspan dx="-4" fill="url(#blueGrad)">&gt;</tspan><tspan fill="#b358b5">}</tspan>
  </text>
</svg>
