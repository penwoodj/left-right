<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#18886c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ab5a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#8a70b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b358b5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <text x="140" y="68" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="72" font-style="italic" font-weight="600" filter="url(#glow)">
    <tspan fill="#3d71bf">{</tspan><tspan fill="url(#greenGrad)">_</tspan><tspan dx="-4" fill="url(#greenGrad)">&lt;</tspan><tspan fill="url(#violetGrad)">_</tspan><tspan dx="-4" fill="url(#violetGrad)">&gt;</tspan><tspan fill="#3d71bf">}</tspan>
  </text>
</svg>
