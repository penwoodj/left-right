<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" width="360" height="100">
  <defs>
    <!-- Left gradient: opens to left input -->
    <linearGradient id="leftGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Right gradient: from right input to close -->
    <linearGradient id="rightGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#0891B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle glow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Subtle background flow lines -->
  <g opacity="0.08">
    <line x1="25" y1="25" x2="95" y2="25" stroke="#2563EB" stroke-width="0.8" />
    <line x1="265" y1="75" x2="335" y2="75" stroke="#FF6B6B" stroke-width="0.8" />
  </g>
  
  <!-- Logo text: {_<_>} with minimal 0.5px spacing -->
  <text x="180" y="72" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace" font-size="68" font-style="italic" font-weight="600" letter-spacing="-0.5">
    
    <!-- { - left bracket, left gradient -->
    <tspan fill="url(#leftGradient)" filter="url(#glow)">{</tspan>
    
    <!-- _< - left input operator, left gradient -->
    <tspan fill="url(#leftGradient)" dx="0.5">_</tspan>
    <tspan fill="url(#leftGradient)" dx="0.5">&lt;</tspan>
    
    <!-- _> - right input operator, right gradient (distinct color) -->
    <tspan fill="url(#rightGradient)" dx="0.5">_</tspan>
    <tspan fill="url(#rightGradient)">&gt;</tspan>
    
    <!-- } - right bracket, right gradient (merges from right) -->
    <tspan fill="url(#rightGradient)" dx="0.5">}</tspan>
    
  </text>
  
  <!-- Subtle underline -->
  <line x1="105" y1="85" x2="255" y2="85" stroke="url(#rightGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.3" />
</svg>
