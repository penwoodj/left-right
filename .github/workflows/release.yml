name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: lr
            asset_name: lr-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: lr
            asset_name: lr-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: lr
            asset_name: lr-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: lr
            asset_name: lr-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: lr.exe
            asset_name: lr-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        working-directory: compiler
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd compiler/target/${{ matrix.target }}/release
          chmod +x ${{ matrix.artifact_name }}
          tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd compiler/target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ..\..\..\${{ matrix.asset_name }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./${{ matrix.asset_name }}.tar.gz
            ./${{ matrix.asset_name }}.zip
