<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <style>
      @font-face {
        font-family: 'IosevkaCurly';
        src: url(data:font/woff2;base64,) format('woff2');
        font-weight: 200;
        font-style: italic;
      }
    </style>
    <!-- Full logo gradient: purple → green → teal bridge → blue → purple -->
    <linearGradient id="fullGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#b358b5;stop-opacity:0.85" />
      <stop offset="12%" style="stop-color:#9a7aaf;stop-opacity:0.8" />
      <stop offset="22%" style="stop-color:#4a9e8a;stop-opacity:0.85" />
      <stop offset="38%" style="stop-color:#6dbfaa;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8abfb2;stop-opacity:0.75" />
      <stop offset="62%" style="stop-color:#6a9fba;stop-opacity:0.8" />
      <stop offset="78%" style="stop-color:#3d71bf;stop-opacity:0.85" />
      <stop offset="88%" style="stop-color:#7a64ba;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b358b5;stop-opacity:0.85" />
    </linearGradient>
    
    <!-- Soft outer glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
      <feColorMatrix in="blur1" type="saturate" values="1.5" result="saturated" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2" />
      <feMerge>
        <feMergeNode in="saturated" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <text x="140" y="68" text-anchor="middle" font-family="'IosevkaCurly', monospace" font-size="72" font-style="italic" font-weight="200" filter="url(#softGlow)" fill="url(#fullGrad)" stroke="url(#fullGrad)" stroke-width="0.5" stroke-linejoin="round"><tspan>{</tspan><tspan dx="-29" dy="-1">&lt;</tspan><tspan dx="-30" dy="-1" textLength="58" lengthAdjust="spacingAndGlyphs">_</tspan><tspan dx="-30" dy="0">&gt;</tspan><tspan dx="-30" dy="1">}</tspan></text>
</svg>
