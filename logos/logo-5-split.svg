<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" width="300" height="160">
  <defs>
    <!-- Left clip: everything to the left of center -->
    <clipPath id="leftClip">
      <rect x="0" y="0" width="150" height="160" />
    </clipPath>

    <!-- Right clip: everything to the right of center -->
    <clipPath id="rightClip">
      <rect x="150" y="0" width="150" height="160" />
    </clipPath>
  </defs>

  <!-- Left half: warm amber -->
  <g clip-path="url(#leftClip)">
    <text x="150" y="85" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="72" font-weight="700" fill="#f59e0b">
      <tspan>{</tspan>
      <tspan dx="3">_</tspan>
      <tspan dx="-2">&lt;</tspan>
      <tspan dx="3">_</tspan>
      <tspan dx="-2">&gt;</tspan>
    </text>

    <!-- LEFT-RIGHT text below -->
    <text x="150" y="130" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="8" fill="#f59e0b">LEFT-RIGHT</text>
  </g>

  <!-- Right half: cool cyan -->
  <g clip-path="url(#rightClip)">
    <text x="150" y="85" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="72" font-weight="700" fill="#06b6d4">
      <tspan>{</tspan>
      <tspan dx="3">_</tspan>
      <tspan dx="-2">&lt;</tspan>
      <tspan dx="3">_</tspan>
      <tspan dx="-2">&gt;</tspan>
    </text>

    <!-- LEFT-RIGHT text below -->
    <text x="150" y="130" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="8" fill="#06b6d4">LEFT-RIGHT</text>
  </g>

  <!-- Vertical divider line at split point -->
  <line x1="150" y1="30" x2="150" y2="145" stroke="#1f2937" stroke-width="1" />
</svg>
