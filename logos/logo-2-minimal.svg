<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Background: transparent -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Mark: { _ < _ > centered horizontally -->
  <text x="100" y="110"
        font-family="'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace"
        font-weight="400"
        font-size="48"
        text-anchor="middle"
        fill="#E76F51">
    {&lt;_&gt;}
  </text>

  <!-- Wordmark: left-right -->
  <text x="100" y="155"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="15"
        text-anchor="middle"
        letter-spacing="0"
        fill="#2D3436">
    left-right
  </text>
</svg>
