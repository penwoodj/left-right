<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <defs>
    <!-- Refined horizontal gradient: purple → green → teal → blue → purple -->
    <linearGradient id="logoGradient" x1="0%" y1="50%" x2="100%" y2="50%" gradientTransform="rotate(0)">
      <stop offset="0%" style="stop-color:#b358b5" />
      <stop offset="25%" style="stop-color:#4a9e8a" />
      <stop offset="50%" style="stop-color:#6dbfaa" />
      <stop offset="75%" style="stop-color:#3d71bf" />
      <stop offset="100%" style="stop-color:#b358b5" />
    </linearGradient>

    <!-- Refined outer glow - subtle and elegant -->
    <filter id="refinedGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path for clean rendering -->
    <clipPath id="textClip">
      <rect x="0" y="0" width="320" height="140" />
    </clipPath>
  </defs>

  <!-- Main logo mark - tight kerning, wave rhythm -->
  <text x="160" y="65"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace"
        font-size="78"
        font-style="italic"
        font-weight="600"
        filter="url(#refinedGlow)"
        fill="url(#logoGradient)"
        clip-path="url(#textClip)"
        letter-spacing="0">
    <tspan x="56" dy="0">{</tspan>
    <tspan x="94" dy="2">_</tspan>
    <tspan x="123" dy="-7">&lt;</tspan>
    <tspan x="159" dy="7">_</tspan>
    <tspan x="196" dy="-7">&gt;</tspan>
  </text>

  <!-- Wordmark - elegant, refined -->
  <text x="160" y="112"
        text-anchor="middle"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="18"
        font-weight="300"
        font-style="italic"
        letter-spacing="3"
        fill="url(#logoGradient)"
        opacity="0.9">
    left-right
  </text>

  <!-- CLI indicator - tiny, subtle -->
  <text x="160" y="128"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="10"
        font-weight="400"
        letter-spacing="1"
        fill="url(#logoGradient)"
        opacity="0.6">
    lr
  </text>
</svg>
